<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My CAD Portfolio</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 2rem;
      font-size: 2rem;
      font-weight: bold;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    model-viewer {
      width: 100%;
      height: 300px;
      background: #020617;
      border-radius: 15px;
    }

    .title {
      margin-top: 10px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .desc {
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<header>
  My CAD Portfolio
</header>

<section class="gallery">

  <!-- MODEL 1 -->
  <div class="card">
    <model-viewer src="models/mind_the_gap.gltf" alt="3D Model" auto-rotate camera-controls></model-viewer>
    <div class="title">Rover Prototype</div>
    <div class="desc">My first rover design using CAD</div>
  </div>

  <!-- MODEL 2 -->
  <!-- <div class="card">
    <model-viewer src="models/model2.glb" alt="3D Model" auto-rotate camera-controls></model-viewer>
    <div class="title">Robot Arm</div>
    <div class="desc">4-axis robotic arm concept</div>
  </div> -->

  <!-- MODEL 3 -->
  <!-- <div class="card">
    <model-viewer src="models/model3.glb" alt="3D Model" auto-rotate camera-controls></model-viewer>
    <div class="title">Gear System</div>
    <div class="desc">Mechanical gear assembly</div>
  </div> -->

</section>

</body>
</html>
